name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

# Only allow one deploy to be in flight at a time.
concurrency:
  group: auto-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          filter: "blob:none"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
            substituters = https://cache.t4t.net/ https://cache.nixos.org/
            trusted-public-keys = cache.t4t.net-1:7NimrD/skv9tL7c3UjgwMxpup/RNcvzd7yrH0QNnlF0= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 1G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or last accessed this duration (ISO 8601 duration format)
          # before the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: P1DT12H
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never

      - name: Write CI builder SSH key
        shell: bash
        run: |
          sudo mkdir -p /etc/nix
          echo "${{ secrets.NIX_CI_BUILD_SSH_KEY }}" | sudo tee /etc/nix/builder_ed25519

      - name: Write CI builders
        shell: bash
        run: |
          nix eval --raw ./nix#ciBuilders | sudo tee /etc/nix/machines

      # Get into our Nix shell :D
      - uses: nicknovitski/nix-develop@v1
        with:
          arguments: "./nix"

      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.NIX_DEPLOY_SSH_KEY }}

      - name: Deploy with Colmena
        id: deploy
        shell: bash
        run: |
          colmena apply --on @auto-deploy -f ./nix/flake.nix

      - name: Notify Discord
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            COLOR=3066993
            STATUS="autodeploy succeeded :3"
          else
            COLOR=15158332
            STATUS="autodeploy failed >//< (${{ steps.deploy.outcome }})"
          fi

          PAYLOAD=$(jq -n \
            --argjson color "$COLOR" \
            --arg status "$STATUS" \
            --arg sha "${{ github.sha }}" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{embeds: [{title: $status, color: $color, fields: [
              {name: "commit", value: $sha, inline: true},
              {name: "run", value: "[view logs](\($run_url))", inline: true}
            ]}]}')

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
